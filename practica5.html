<!DOCTYPE html> <!-- HTML5 -->
<html lang="en"> <!-- Idioma del documento -->
<head>
    <meta charset="UTF-8"> <!-- Codificación -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive -->
    <title>Document</title>
</head>
<body>

    <!-- 
    LISTAS NO ORDENADAS (ul)

    - <ul> = "unordered list"
    - Se usa cuando el orden de los elementos NO importa.
    - Cada ítem va dentro de <li> (list item).

    Características:
    - Renderiza con viñetas (•) por defecto.
    - Es semántica: indica agrupación de elementos relacionados.
    - Puede anidarse (listas dentro de listas).

    Buenas prácticas:
    - Usar <ul> para menús, listas de opciones, características, etc.
    - No usar <br> para simular listas (mala práctica).
    -->

    <ul> <!-- Contenedor de lista no ordenada -->
        
        <li>Elemento 1</li> <!-- Ítem de la lista -->
        <li>Elemento 2</li> <!-- Ítem de la lista -->
        <li>Elemento 3</li> <!-- Ítem de la lista -->

    </ul>

    <!-- 
    IMPORTANTE:
    - <li> solo debe existir dentro de <ul>, <ol> o <menu>.
    - El contenido de <li> puede ser:
        * texto
        * imágenes
        * enlaces
        * incluso otras listas (anidación)
    -->

</body>
</html>
