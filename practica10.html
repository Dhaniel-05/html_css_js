<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- La etiqueta table se utiliza para definir tablas en HTML. Todo el contenido de la tabla, incluidas las filas y celdas, se coloca dentro de esta etiqueta -->

    <!-- La etiqueta tr se utiliza para definir una fila en una tabla. Cada fila puede contener una o más celdas, que se definen utilizando las etiquetas td (para celdas de datos) o th (para celdas de encabezado) -->

    <!-- La etique td define una celda de datos dentro de una fila. Cada etiqueta td representa una columna en la tabla -->

    <!-- La etiqueta th define una celda de encabezado dentro de una fila. Cada etiqueta th representa un encabezado de columna en la tabla -->

    <table border="1"> <!-- Etiqueta de apertura -->
        <tr> <!-- Fila 1 -->
            <th>Encabezado 1</th> <!-- Celda de encabezado -->
            <th>Encabezado 2</th> <!-- Celda de encabezado -->
            <th>Encabezado 3</th> <!-- Celda de encabezado -->
        </tr>
        <tr> <!-- Fila 2 -->
            <td>Dato 1</td> <!-- Celda de datos -->
            <td>Dato 2</td> <!-- Celda de datos -->
            <td>Dato 3</td> <!-- Celda de datos -->
        </tr>
        <tr> <!-- Fila 3 -->
            <td>Dato 4</td> <!-- Celda de datos -->
            <td>Dato 5</td> <!-- Celda de datos -->
            <td>Dato 6</td> <!-- Celda de datos -->
        </tr>
    </table> <!-- Etiqueta de cierre -->

    <br>

    <table border="1">
        <caption>Paises y Capitales</caption>
        <tr>
            <th>País</th>
            <th>Capital</th>
        </tr>
        <tr>
            <td>España</td>
            <td>Madrid</td>
        </tr>
        <tr>
            <td>Francia</td>
            <td>París</td>
        </tr>
        <tr>
            <td>Italia</td>
            <td>Roma</td>
        </tr>
    </table>

    <br>

    <table border="1"> <!-- Tabla con celdas combinadas -->
        <tr>
            <th colspan="4">Mundial de Fútbol</th> <!-- Celda de encabezado que abarca dos columnas -->
        </tr>
        <tr>
            <td rowspan="3">Paises con mayoría de goles</td> <!-- Celda de datos que abarca dos filas -->
            <td>Brasil 2</td> <td>230</td>
        </tr>
        <tr>
            <td>Alemania</td> <td>180</td>
        </tr>
        <tr>
            <td>Argentina</td> <td>150</td>
        </tr>
    </table>


</body>
</html>
