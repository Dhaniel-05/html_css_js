<!DOCTYPE html> <!-- HTML5: define el estándar de renderizado -->
<html lang="en"> <!-- Idioma del documento (inglés) -->
<head>
    <meta charset="UTF-8"> <!-- Codificación universal -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive -->
    <title>Document</title> <!-- Título de la pestaña -->
</head>
<body>

    <!-- 
    TÍTULOS EN HTML (h1 - h6)

    - Representan niveles jerárquicos de contenido, no solo tamaño visual.
    - Son clave para:
        * Estructura semántica
        * Accesibilidad (lectores de pantalla)
        * SEO (motores de búsqueda)

    Jerarquía:
    h1 → tema principal de la página
    h2 → secciones principales
    h3 → subsecciones
    ...
    h6 → nivel más bajo

    Buenas prácticas:
    - Usar un solo h1 por página (generalmente)
    - No saltar niveles (evitar h1 → h3 sin h2)
    - No usar headings solo para hacer texto grande (eso es CSS)
    -->

    <h1>Titulo principal o de primer orden</h1> <!-- Tema principal -->
    <h2>Titulo de segundo orden</h2> <!-- Subtema de h1 -->
    <h3>Titulo de tercer orden</h3> <!-- Subnivel de h2 -->
    <h4>Titulo de cuarto orden</h4> <!-- Jerarquía descendente -->
    <h5>Titulo de quinto orden</h5> <!-- Nivel bajo -->
    <h6>Titulo de sexto orden</h6> <!-- Nivel más específico -->

    <!-- 
    EMETT (productividad en editores como VS Code)

    h$*6 → genera automáticamente:
    <h1></h1> hasta <h6></h6>

    - $ se reemplaza por números incrementales
    - Acelera escritura de estructuras repetitivas
    -->
<a href="/practica7.html">Volver</a>
</body>
</html>
